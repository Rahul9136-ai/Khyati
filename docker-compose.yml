# Full containerized stack: Postgres + Redis + API (with migrations) + Celery
# worker + nginx-served SPA that reverse-proxies /api to the backend.
#
#   docker compose up -d --build
#   docker compose exec backend python -m app.db.seed   # demo org + accounts
#   → app on http://localhost:8080, API docs on http://localhost:8000/docs
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wfm
      POSTGRES_PASSWORD: wfm
      POSTGRES_DB: wfm
    ports: ["5433:5432"]           # host port 5433 avoids clashing with local PG
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfm"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]           # host port 6380 avoids clashing with local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      ENVIRONMENT: local
      DEBUG: "false"
      DB_BACKEND: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: wfm
      POSTGRES_PASSWORD: wfm
      POSTGRES_DB: wfm
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me-in-production-32-bytes}
      BACKEND_CORS_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost:5180
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app.celery worker --loglevel=info
    environment:
      DB_BACKEND: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: wfm
      POSTGRES_PASSWORD: wfm
      POSTGRES_DB: wfm
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me-in-production-32-bytes}
    depends_on:
      redis: { condition: service_healthy }
      db: { condition: service_healthy }

  frontend:
    build: ./frontend                # bakes VITE_API_BASE_URL=/api/v1 (same-origin)
    ports: ["8080:80"]
    depends_on: [backend]

volumes:
  pgdata:
